<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hbn</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">hbn</div>
    <div class="score-wrap">
      <span id="score-label">TILES</span>
      <span id="score">0 / 9</span>
    </div>
  </header>

  <main>

    <div class="layout" id="layout">

      <!-- LEFT: tiled image -->
      <div class="image-side">
        <div class="tile-grid" id="tile-grid"></div>
        <div class="image-hint" id="image-hint">with love from Caleb and Claude</div>
      </div>

      <!-- RIGHT: question panel -->
      <div class="question-side" id="quiz-card">
        <div class="question-meta">
          <span id="q-counter">Question 1</span>
          <span id="q-category"></span>
        </div>
        <h2 id="question-text"></h2>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback"></div>
        <button class="btn-next" id="btn-next" style="display:none">NEXT →</button>
      </div>

    </div>

    <!-- Secret overlay — shown when all 9 tiles are clear -->
    <div class="secret-overlay" id="secret-overlay" style="display:none">
      <div class="secret-inner">
        <div class="secret-eyebrow">🔓 SECRET UNLOCKED</div>
        <div class="secret-msg" id="secret-msg"></div>
        <button class="btn-restart" onclick="startQuiz()">PLAY AGAIN</button>
      </div>
    </div>

    <!-- End screen — questions ran out before all tiles revealed -->
    <div class="end-screen" id="end-screen" style="display:none">
      <div class="end-inner">
        <div class="end-title">QUIZ COMPLETE</div>
        <div class="end-score" id="end-score"></div>
        <p id="end-msg"></p>
        <button class="btn-restart" onclick="startQuiz()">TRY AGAIN</button>
      </div>
    </div>

  </main>

  <script>
  // StackBlur — uniform box blur on canvas, no edge fade
  // Based on Mario Klingemann's algorithm (public domain)
  function stackBlurCanvas(canvas, top_x, top_y, width, height, radius) {
    const ctx = canvas.getContext("2d");
    const imageData = ctx.getImageData(top_x, top_y, width, height);
    const pixels = imageData.data;
    const div = 2 * radius + 1;
    const w4 = width * 4;
    const widthMinus1 = width - 1;
    const heightMinus1 = height - 1;
    const radiusPlus1 = radius + 1;
    const sumFactor = radiusPlus1 * (radiusPlus1 + 1) / 2;
    const stackStart = new BlurStack();
    let stack = stackStart;
    for (let i = 1; i < div; i++) { stack = stack.next = new BlurStack(); }
    stack.next = stackStart;
    let stackIn = null, stackOut = null;
    let yw = 0, yi = 0;
    const mulSum = MUL_TABLE[radius], shgSum = SHG_TABLE[radius];
    for (let y = 0; y < height; y++) {
      let rInSum = 0, gInSum = 0, bInSum = 0, aInSum = 0;
      let rSum = 0, gSum = 0, bSum = 0, aSum = 0;
      let rOutSum = 0, gOutSum = 0, bOutSum = 0, aOutSum = 0;
      let p = yw << 2;
      let ri = pixels[p], gi = pixels[p+1], bi = pixels[p+2], ai = pixels[p+3];
      stack = stackStart;
      for (let i = 0; i < radiusPlus1; i++) {
        stack.r = ri; stack.g = gi; stack.b = bi; stack.a = ai;
        rSum += ri * (i + 1); gSum += gi * (i + 1); bSum += bi * (i + 1); aSum += ai * (i + 1);
        rOutSum += ri; gOutSum += gi; bOutSum += bi; aOutSum += ai;
        stack = stack.next;
      }
      for (let i = 1; i < radiusPlus1; i++) {
        p = (yw + Math.min(i, widthMinus1)) << 2;
        ri = pixels[p]; gi = pixels[p+1]; bi = pixels[p+2]; ai = pixels[p+3];
        stack.r = ri; stack.g = gi; stack.b = bi; stack.a = ai;
        rSum += ri * (radiusPlus1 - i); gSum += gi * (radiusPlus1 - i); bSum += bi * (radiusPlus1 - i); aSum += ai * (radiusPlus1 - i);
        rInSum += ri; gInSum += gi; bInSum += bi; aInSum += ai;
        stack = stack.next;
      }
      stackIn = stackStart; stackOut = stackStart;
      for (let x = 0; x < width; x++) {
        pixels[yi]   = (rSum * mulSum) >> shgSum;
        pixels[yi+1] = (gSum * mulSum) >> shgSum;
        pixels[yi+2] = (bSum * mulSum) >> shgSum;
        pixels[yi+3] = (aSum * mulSum) >> shgSum;
        rSum -= rOutSum; gSum -= gOutSum; bSum -= bOutSum; aSum -= aOutSum;
        rOutSum -= stackOut.r; gOutSum -= stackOut.g; bOutSum -= stackOut.b; aOutSum -= stackOut.a;
        p = (yw + Math.min(x + radiusPlus1, widthMinus1)) << 2;
        stackIn.r = pixels[p]; stackIn.g = pixels[p+1]; stackIn.b = pixels[p+2]; stackIn.a = pixels[p+3];
        rInSum += stackIn.r; gInSum += stackIn.g; bInSum += stackIn.b; aInSum += stackIn.a;
        rSum += rInSum; gSum += gInSum; bSum += bInSum; aSum += aInSum;
        stackOut = stackOut.next; stackIn = stackIn.next;
        rOutSum += stackOut.r; gOutSum += stackOut.g; bOutSum += stackOut.b; aOutSum += stackOut.a;
        rInSum -= stackIn.r; gInSum -= stackIn.g; bInSum -= stackIn.b; aInSum -= stackIn.a;
        yi += 4;
      }
      yw += width;
    }
    for (let x = 0; x < width; x++) {
      let rInSum = 0, gInSum = 0, bInSum = 0, aInSum = 0;
      let rSum = 0, gSum = 0, bSum = 0, aSum = 0;
      let rOutSum = 0, gOutSum = 0, bOutSum = 0, aOutSum = 0;
      yi = x << 2;
      let ri = pixels[yi], gi = pixels[yi+1], bi = pixels[yi+2], ai = pixels[yi+3];
      stack = stackStart;
      for (let i = 0; i < radiusPlus1; i++) {
        stack.r = ri; stack.g = gi; stack.b = bi; stack.a = ai;
        rSum += ri * (i+1); gSum += gi * (i+1); bSum += bi * (i+1); aSum += ai * (i+1);
        rOutSum += ri; gOutSum += gi; bOutSum += bi; aOutSum += ai;
        stack = stack.next;
      }
      for (let i = 1; i < radiusPlus1; i++) {
        yi = (Math.min(i, heightMinus1) * w4) + (x << 2);
        ri = pixels[yi]; gi = pixels[yi+1]; bi = pixels[yi+2]; ai = pixels[yi+3];
        stack.r = ri; stack.g = gi; stack.b = bi; stack.a = ai;
        rSum += ri * (radiusPlus1 - i); gSum += gi * (radiusPlus1 - i); bSum += bi * (radiusPlus1 - i); aSum += ai * (radiusPlus1 - i);
        rInSum += ri; gInSum += gi; bInSum += bi; aInSum += ai;
        stack = stack.next;
      }
      yi = x; stackIn = stackStart; stackOut = stackStart;
      for (let y = 0; y < height; y++) {
        const p4 = yi << 2;
        pixels[p4]   = (rSum * mulSum) >> shgSum;
        pixels[p4+1] = (gSum * mulSum) >> shgSum;
        pixels[p4+2] = (bSum * mulSum) >> shgSum;
        pixels[p4+3] = (aSum * mulSum) >> shgSum;
        rSum -= rOutSum; gSum -= gOutSum; bSum -= bOutSum; aSum -= aOutSum;
        rOutSum -= stackOut.r; gOutSum -= stackOut.g; bOutSum -= stackOut.b; aOutSum -= stackOut.a;
        const p = ((Math.min(y + radiusPlus1, heightMinus1) * width) + x) << 2;
        stackIn.r = pixels[p]; stackIn.g = pixels[p+1]; stackIn.b = pixels[p+2]; stackIn.a = pixels[p+3];
        rInSum += stackIn.r; gInSum += stackIn.g; bInSum += stackIn.b; aInSum += stackIn.a;
        rSum += rInSum; gSum += gInSum; bSum += bInSum; aSum += aInSum;
        stackOut = stackOut.next; stackIn = stackIn.next;
        rOutSum += stackOut.r; gOutSum += stackOut.g; bOutSum += stackOut.b; aOutSum += stackOut.a;
        rInSum -= stackIn.r; gInSum -= stackIn.g; bInSum -= stackIn.b; aInSum -= stackIn.a;
        yi += width;
      }
    }
    ctx.putImageData(imageData, top_x, top_y);
  }
  function BlurStack() { this.r=0; this.g=0; this.b=0; this.a=0; this.next=null; }
  const MUL_TABLE = [512,512,456,512,328,456,335,512,405,328,271,456,388,335,292,512,454,405,364,328,298,271,496,456,420,388,360,335,312,292,273,512,482,454,428,405,383,364,345,328,312,298,284,271,259,496,475,456,437,420,404,388,374,360,347,335,323,312,302,292,282,273,265,512,497,482,468,454,441,428,417,405,394,383,373,364,354,345,337,328,320,312,305,298,291,284,278,271,265,259,507,496,485,475,465,456,446,437,428,420,412,404,396,388,381,374,367,360,354,347,341,335,329,323,318,312,307,302,297,292,287,282,278,273,269,265,261,512,505,497,489,482,475,468,461,454,447,441,435,428,422,417,411,405,399,394,389,383,378,373,368,364,359,354,350,345,341,337,332,328,324,320,316,312,309,305,301,298,294,291,287,284,281,278,274,271,268,265,262,259,257,507,501,496,491,485,480,475,470,465,460,456,451,446,442,437,433,428,424,420,416,412,408,404,400,396,392,388,385,381,377,374,370,367,363,360,357,354,350,347,344,341,338,335,332,329,326,323,320,318,315,312,310,307,304,302,299,297,294,292,289,287,285,282,280,278,275,273,271,269,267,265,263,261,259];
  const SHG_TABLE = [9,11,12,13,13,14,14,15,15,15,15,16,16,16,16,17,17,17,17,17,17,17,18,18,18,18,18,18,18,18,18,19,19,19,19,19,19,19,19,19,19,19,19,19,19,20,20,20,20,20,20,20,20,20,20,20,20,20,20,20,20,20,20,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,22,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,23,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24,24];
  </script>
