<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hbn</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">hbn</div>
    <div class="score-wrap">
      <span id="score-label">TILES</span>
      <span id="score">0 / 9</span>
    </div>
  </header>

  <main>

    <div class="layout" id="layout">

      <!-- LEFT: tiled image -->
      <div class="image-side">
        <div class="tile-grid" id="tile-grid"></div>
        <div class="image-hint" id="image-hint">with love from Caleb and Claude</div>
      </div>

      <!-- RIGHT: question panel -->
      <div class="question-side" id="quiz-card">
        <div class="question-meta">
          <span id="q-counter">Question 1</span>
          <span id="q-category"></span>
        </div>
        <h2 id="question-text"></h2>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback"></div>
        <button class="btn-next" id="btn-next" style="display:none">NEXT →</button>
      </div>

    </div>

    <!-- Secret overlay — shown when all 9 tiles are clear -->
    <div class="secret-overlay" id="secret-overlay" style="display:none">
      <div class="secret-inner">
        <div class="secret-eyebrow">🔓 SECRET UNLOCKED</div>
        <div class="secret-msg" id="secret-msg"></div>
        <button class="btn-restart" onclick="startQuiz()">PLAY AGAIN</button>
      </div>
    </div>

    <!-- End screen — questions ran out before all tiles revealed -->
    <div class="end-screen" id="end-screen" style="display:none">
      <div class="end-inner">
        <div class="end-title">QUIZ COMPLETE</div>
        <div class="end-score" id="end-score"></div>
        <p id="end-msg"></p>
        <button class="btn-restart" onclick="startQuiz()">TRY AGAIN</button>
      </div>
    </div>

  </main>

  <script>
  // Simple iterative box blur — artefact-free, uniform to all edges.
  // Running 3 passes of a box blur approximates a Gaussian.
  function stackBlurCanvas(canvas, top_x, top_y, w, h, radius) {
    const ctx = canvas.getContext("2d");
    const src = ctx.getImageData(top_x, top_y, w, h);
    const dst = ctx.createImageData(w, h);

    function boxBlurH(s, d, r) {
      const iarr = 1 / (r + r + 1);
      for (let i = 0; i < h; i++) {
        let ti = i * w, li = ti, ri = ti + r;
        let fv = s.data[ti*4], lv = s.data[(ti+w-1)*4];
        let rR = (r+1)*fv, rG = (r+1)*s.data[ti*4+1],
            rB = (r+1)*s.data[ti*4+2], rA = (r+1)*s.data[ti*4+3];
        for (let j = 0; j < r; j++) {
          rR += s.data[(ti+j)*4]; rG += s.data[(ti+j)*4+1];
          rB += s.data[(ti+j)*4+2]; rA += s.data[(ti+j)*4+3];
        }
        for (let j = 0; j <= r; j++) {
          rR += s.data[ri*4]   - fv; rG += s.data[ri*4+1] - s.data[ti*4+1];
          rB += s.data[ri*4+2] - s.data[ti*4+2]; rA += s.data[ri*4+3] - s.data[ti*4+3];
          d.data[ti*4]   = rR*iarr|0; d.data[ti*4+1] = rG*iarr|0;
          d.data[ti*4+2] = rB*iarr|0; d.data[ti*4+3] = rA*iarr|0;
          ri = Math.min(ri+1, ti+w-1); ti++;
        }
        for (let j = r+1; j < w-r; j++) {
          rR += s.data[ri*4]   - s.data[li*4];   rG += s.data[ri*4+1] - s.data[li*4+1];
          rB += s.data[ri*4+2] - s.data[li*4+2]; rA += s.data[ri*4+3] - s.data[li*4+3];
          d.data[ti*4]   = rR*iarr|0; d.data[ti*4+1] = rG*iarr|0;
          d.data[ti*4+2] = rB*iarr|0; d.data[ti*4+3] = rA*iarr|0;
          li++; ri++; ti++;
        }
        for (let j = w-r; j < w; j++) {
          lv = s.data[(i*w+w-1)*4];
          rR += lv - s.data[li*4];   rG += s.data[(i*w+w-1)*4+1] - s.data[li*4+1];
          rB += s.data[(i*w+w-1)*4+2] - s.data[li*4+2]; rA += s.data[(i*w+w-1)*4+3] - s.data[li*4+3];
          d.data[ti*4]   = rR*iarr|0; d.data[ti*4+1] = rG*iarr|0;
          d.data[ti*4+2] = rB*iarr|0; d.data[ti*4+3] = rA*iarr|0;
          li++; ti++;
        }
      }
    }

    function boxBlurV(s, d, r) {
      const iarr = 1 / (r + r + 1);
      for (let i = 0; i < w; i++) {
        let ti = i, li = ti, ri = ti + r*w;
        let fv = s.data[ti*4], lv = s.data[(ti+(h-1)*w)*4];
        let rR = (r+1)*fv, rG = (r+1)*s.data[ti*4+1],
            rB = (r+1)*s.data[ti*4+2], rA = (r+1)*s.data[ti*4+3];
        for (let j = 0; j < r; j++) {
          rR += s.data[(ti+j*w)*4]; rG += s.data[(ti+j*w)*4+1];
          rB += s.data[(ti+j*w)*4+2]; rA += s.data[(ti+j*w)*4+3];
        }
        for (let j = 0; j <= r; j++) {
          rR += s.data[ri*4]   - fv; rG += s.data[ri*4+1] - s.data[ti*4+1];
          rB += s.data[ri*4+2] - s.data[ti*4+2]; rA += s.data[ri*4+3] - s.data[ti*4+3];
          d.data[ti*4]   = rR*iarr|0; d.data[ti*4+1] = rG*iarr|0;
          d.data[ti*4+2] = rB*iarr|0; d.data[ti*4+3] = rA*iarr|0;
          ri = Math.min(ri+w, ti+(h-1)*w); ti += w;
        }
        for (let j = r+1; j < h-r; j++) {
          rR += s.data[ri*4]   - s.data[li*4];   rG += s.data[ri*4+1] - s.data[li*4+1];
          rB += s.data[ri*4+2] - s.data[li*4+2]; rA += s.data[ri*4+3] - s.data[li*4+3];
          d.data[ti*4]   = rR*iarr|0; d.data[ti*4+1] = rG*iarr|0;
          d.data[ti*4+2] = rB*iarr|0; d.data[ti*4+3] = rA*iarr|0;
          li += w; ri += w; ti += w;
        }
        for (let j = h-r; j < h; j++) {
          const lp = (i+(h-1)*w)*4;
          rR += s.data[lp]   - s.data[li*4];   rG += s.data[lp+1] - s.data[li*4+1];
          rB += s.data[lp+2] - s.data[li*4+2]; rA += s.data[lp+3] - s.data[li*4+3];
          d.data[ti*4]   = rR*iarr|0; d.data[ti*4+1] = rG*iarr|0;
          d.data[ti*4+2] = rB*iarr|0; d.data[ti*4+3] = rA*iarr|0;
          li += w; ti += w;
        }
      }
    }

    // 3 passes of box blur approximates a Gaussian
    let a = src, b = dst;
    for (let pass = 0; pass < 3; pass++) {
      boxBlurH(a, b, radius); [a, b] = [b, a];
      boxBlurV(a, b, radius); [a, b] = [b, a];
    }
    ctx.putImageData(a, top_x, top_y);
  }
  </script>
  <script src="quiz.js"></script>
</body>
</html>
